<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkliste Wärmepumpe / Elektro</title>

<style>
body{font-family:Arial;margin:0;background:#f4f7f8}
.wrapper{max-width:1000px;margin:auto;padding:20px}
.header{display:flex;gap:20px;align-items:center}
.logo{height:70px}
.card{background:white;padding:20px;border-radius:12px;margin-top:20px}
button{padding:15px;border:none;border-radius:10px;font-size:18px;cursor:pointer}
.green{background:#009681;color:white}
.orange{background:#f97316;color:white}
.page{display:none}
.page.active{display:block}
</style>
</head>

<body>

<div id="start" class="page active wrapper">

<div class="header">
<img id="logoMain" class="logo">
<img id="logoPartner" class="logo">
</div>

<div class="card">
<h2>Projekt-Checkliste</h2>

<button class="green" onclick="openPage('wp')">🔥 Wärmepumpe</button>
<button class="orange" onclick="openPage('el')">⚡ Elektro / PV</button>

</div>
</div>

<div id="wp" class="page wrapper">

<button onclick="openPage('start')">⬅️ Zurück</button>

<div class="header">
<img id="logoMain_wp" class="logo">
</div>

<div class="card">
<h3>Name</h3>
<input id="name">
<h3>Adresse</h3>
<input id="adresse">
<h3>Baujahr</h3>
<input id="baujahr_gebaeude">
</div>

</div>

<div id="el" class="page wrapper">

<button onclick="openPage('start')">⬅️ Zurück</button>

<div class="header">
<img id="logoPartner_el" class="logo">
</div>

<div class="card">
<h3>Name</h3>
<input id="el_name">
<h3>Adresse</h3>
<input id="el_adresse">
<h3>Baujahr</h3>
<input id="el_baujahr_gebaeude">
</div>

</div>

<script>

/* LOGO FIX (probiert mehrere Namen) */
function loadLogo(imgId, files){
let img=document.getElementById(imgId)
let i=0

function tryNext(){
if(i>=files.length)return
img.src=files[i]
img.onerror=()=>{i++;tryNext()}
}

tryNext()
}

function initLogos(){
loadLogo("logoMain",["logo.jpg"])
loadLogo("logoMain_wp",["logo.jpg"])

loadLogo("logoPartner",[
"logo_riera.jpg",
"Logo_riera.jpg",
"logo_riera.JPG"
])

loadLogo("logoPartner_el",[
"logo_riera.jpg",
"Logo_riera.jpg",
"logo_riera.JPG"
])
}

/* SYNCHRONISIERUNG */
const mapping=[
["name","el_name"],
["adresse","el_adresse"],
["baujahr_gebaeude","el_baujahr_gebaeude"]
]

function sync(from,to){
let a=document.getElementById(from)
let b=document.getElementById(to)
if(a && b) b.value=a.value
}

function initSync(){
mapping.forEach(([a,b])=>{
let f1=document.getElementById(a)
let f2=document.getElementById(b)

if(f1){
f1.oninput=()=>sync(a,b)
}
if(f2){
f2.oninput=()=>sync(b,a)
}
})
}

/* NAVIGATION */
function openPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

/* INIT */
window.onload=()=>{
initLogos()
initSync()
}

</script>

</body>
</html>
