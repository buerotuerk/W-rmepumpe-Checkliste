<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wärmepumpen-Checkliste Altbau</title>

<style>
:root{--green:#009681;--dark:#1f2937;--bg:#f4f7f8;--border:#d9e2e4}
body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--dark)}
.wrapper{max-width:1200px;margin:auto;padding:24px}
.header{display:flex;align-items:center;gap:32px;margin-bottom:24px;background:white;padding:12px;border-radius:12px}
.logo{max-width:380px;width:40%}
h1{font-size:34px;margin:0}
.grid{display:grid;grid-template-columns:2fr 1fr;gap:24px}
.card{background:white;border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:22px}
h2{color:var(--green);margin-top:0}
.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
label{font-weight:bold;display:block;margin-bottom:6px}
input,select,textarea{width:100%;padding:12px;border:1px solid #cfd8dc;border-radius:8px;font-size:16px}
textarea{min-height:90px}
.preview{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px}
.preview img{width:100%;height:120px;object-fit:cover;border-radius:10px;border:1px solid #ddd}
.photoBox{border:2px dashed #8acbc2;padding:18px;border-radius:12px;text-align:center;background:#f6fffd}
button{background:var(--green);color:white;border:none;padding:13px;border-radius:8px;font-size:16px;margin-top:8px}
.actions{display:flex;flex-direction:column;gap:10px}
.footer{background:var(--green);color:white;text-align:center;padding:14px;margin-top:24px}
</style>
</head>

<body>

<div class="wrapper">

<div class="header">
<img src="logo.jpg" class="logo">
<h1>Wärmepumpen-Checkliste Altbau</h1>
</div>

<div class="grid">

<main>

<div class="card">
<h2>1. Kundendaten</h2>
<div class="formgrid">
<div><label>Name</label><input id="name"></div>
<div><label>Adresse</label><input id="adresse"></div>
<div><label>Telefon</label><input id="telefon"></div>
<div><label>E-Mail</label><input id="email"></div>
<div><label>Gebäudetyp</label><select id="gebaeudetyp"><option></option><option>Einfamilienhaus</option></select></div>
<div><label>Baujahr Gebäude</label><input id="baujahr_gebaeude"></div>
</div>
</div>

<div class="card">
<h2>2. Energieverbrauch</h2>
<input id="verbrauch">
</div>

</main>

<aside>

<div class="card actions">
<h2>Ausgabe</h2>

<button onclick="speichern()">💾 Speichern</button>
<button onclick="laden()">📂 Laden</button>

<button onclick="window.print()">📄 PDF</button>
<button onclick="mailSenden()">✉️ Mail</button>

</div>

</aside>

</div>
</div>

<div class="footer">Ihre Daten werden vertraulich behandelt</div>

<script>
function speichern(){
let daten={}
document.querySelectorAll("input,select,textarea").forEach(f=>daten[f.id]=f.value)
localStorage.setItem("wp",JSON.stringify(daten))
alert("Gespeichert")
}

function laden(){
let d=JSON.parse(localStorage.getItem("wp"))
if(!d)return alert("Keine Daten")
Object.keys(d).forEach(id=>{
let f=document.getElementById(id)
if(f)f.value=d[id]
})
}

function mailSenden(){
let text=""
document.querySelectorAll("input,select,textarea").forEach(f=>{
text+=f.id+": "+f.value+"\n"
})
window.location="mailto:?body="+encodeURIComponent(text)
}
</script>

</body>
</html>
